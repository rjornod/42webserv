name: Build
run-name: ${{ github.actor }} is building the webserv

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install y build-essential

      - name: Build
        run: make

      - name: Verify that executable exists
        run: |
          if [ -f webserv ]; then
            echo "✅ Executable built successfully"
          else
            echo "❌ Executable not found"
            exit 1
          fi
